<!DOCTYPE html>
<html lang="en" style="background:#1e3a8a">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon-192.png" />
    
    <!-- DNS prefetch and preconnect for performance -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Google Fonts: Inter (UI) and Fira Code (Monospace) with preload for critical font -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"></noscript>
    
    <!-- Performance optimizations -->
    <meta name="theme-color" content="#1e3a8a">

    <!-- SEO Meta Tags -->
    <title>Sevan Lewis-Payne | Full-Stack Software Developer</title>
    <meta name="description" content="Sevan Lewis-Payne — Full-Stack Software Developer. Portfolio showcasing projects in React, TypeScript, Go, Python, and more." />
    <meta name="keywords" content="Sevan Lewis-Payne, Sevan, software developer, full-stack developer, React, TypeScript, Go, Python, portfolio" />
    <meta name="author" content="Sevan Lewis-Payne" />
    <link rel="canonical" href="https://sevanlewispayne.com" />

    <!-- Open Graph (social media previews) -->
    <meta property="og:title" content="Sevan Lewis-Payne | Full-Stack Software Developer" />
    <meta property="og:description" content="Full-Stack Software Developer — React, TypeScript, Go, Python. View my projects and experience." />
    <meta property="og:url" content="https://sevanlewispayne.com" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://sevanlewispayne.com/favicon-192.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sevan Lewis-Payne | Full-Stack Software Developer" />
    <meta name="twitter:description" content="Full-Stack Software Developer — React, TypeScript, Go, Python. View my projects and experience." />
    <meta name="twitter:image" content="https://sevanlewispayne.com/favicon-192.png" />

    <!-- Prefetch 3D model so it starts downloading before React mounts.
         Using prefetch (not preload) avoids blocking the parser while still
         warming the HTTP cache for faster useGLTF resolution. -->
    <link rel="prefetch" href="/models/low_poly_90s_office_cubicle.glb" as="fetch" crossorigin="anonymous" />
    <link rel="preload" href="/fonts/helvetiker_regular.typeface.json" as="fetch" crossorigin="anonymous" />
    
    <style>
      /* Reset and base styles */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1e3a8a;
      }
      
      #root {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Blue curtain: covers everything on load. Dismissed by JS once loading canvas is painted.
         Re-shown on beforeunload so CSS3D content can never flash during reload. -->
    <div id="page-cover" style="position:fixed;inset:0;background:#1e3a8a;z-index:99999"></div>
    <script>
      window.addEventListener('beforeunload', function () {
        var c = document.getElementById('page-cover');
        if (c) c.style.display = '';
      });
    </script>

    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
